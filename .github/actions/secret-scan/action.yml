name: Secret Scan
description: Scan a Docker image for leaked secrets before pushing to a registry.

inputs:
  image:
    description: Docker image to scan (must be built locally)
    required: true
  exclude-detectors:
    description: Comma-separated list of detector names to exclude (e.g. Beamer,Slack)
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Install trufflehog
      run: |
        curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin
      shell: bash

    - name: Scan image for secrets
      run: |
        set -euo pipefail
        echo "Scanning ${{ inputs.image }} for secrets..."
        IMAGE_TAR=$(mktemp --suffix=.tar)
        docker save "${{ inputs.image }}" -o "${IMAGE_TAR}"

        EXCLUDE_ARG=""
        if [ -n "${{ inputs.exclude-detectors }}" ]; then
          EXCLUDE_ARG="--exclude-detectors=${{ inputs.exclude-detectors }}"
        fi

        OUTPUT=$(trufflehog docker --image="file://${IMAGE_TAR}" --fail ${EXCLUDE_ARG} 2>&1) || EXIT_CODE=$?
        rm "${IMAGE_TAR}"

        if [ -n "${OUTPUT}" ]; then
          echo "${OUTPUT}"
        fi

        if echo "${OUTPUT}" | grep -qi "error"; then
          echo "::error::Trufflehog encountered an error scanning ${{ inputs.image }}"
          exit 1
        fi

        if [ "${EXIT_CODE:-0}" -ne 0 ]; then
          echo "::error::Secrets detected in Docker image ${{ inputs.image }}. Do NOT push this image."
          exit 1
        fi

        echo "No secrets found."
      shell: bash
