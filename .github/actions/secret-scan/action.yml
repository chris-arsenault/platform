name: Secret Scan
description: Scan a Docker image for leaked secrets before pushing to a registry.

inputs:
  image:
    description: Docker image to scan (must be built locally)
    required: true

runs:
  using: composite
  steps:
    - name: Install trufflehog
      run: |
        curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin
      shell: bash

    - name: Scan image for secrets
      run: |
        echo "Scanning ${{ inputs.image }} for secrets..."
        IMAGE_TAR=$(mktemp --suffix=.tar)
        docker save "${{ inputs.image }}" -o "${IMAGE_TAR}"
        trufflehog docker --image="file://${IMAGE_TAR}" --only-verified --fail 2>&1 || {
          rm "${IMAGE_TAR}"
          echo "::error::Secrets detected in Docker image ${{ inputs.image }}. Do NOT push this image."
          exit 1
        }
        rm "${IMAGE_TAR}"
        echo "No secrets found."
      shell: bash
