name: Governance Check
description: |
  Validates that the CI workflow contains required steps based on the
  project's declared stack in platform.yml. Fails fast if steps are missing.

  Run this as the FIRST step in the CI job, after checkout.

runs:
  using: composite
  steps:
    - run: |
        set -euo pipefail
        python3 << 'PYEOF'
        import yaml, sys, os

        config_path = "platform.yml"
        workflow_path = ".github/workflows/ci.yml"

        if not os.path.exists(config_path):
            print(f"::error::Missing {config_path} — every platform project must declare its stack")
            sys.exit(1)

        if not os.path.exists(workflow_path):
            print(f"::error::Missing {workflow_path}")
            sys.exit(1)

        with open(config_path) as f:
            config = yaml.safe_load(f)

        with open(workflow_path) as f:
            workflow = yaml.safe_load(f)

        stack = set(config.get("stack", []))
        if not stack:
            print(f"::error::{config_path} must declare a 'stack' list (e.g. rust, typescript, terraform)")
            sys.exit(1)

        # If rust is in stack, rust_artifacts must be declared explicitly.
        # Empty {} is allowed (rust code with no deployable artifacts, e.g. libraries).
        if "rust" in stack:
            if "rust_artifacts" not in config:
                print(f"::error::{config_path} declares 'rust' in stack but is missing 'rust_artifacts'")
                print("::error::Add a top-level 'rust_artifacts:' block. Use {} if no artifacts are deployed.")
                sys.exit(1)
            ra = config.get("rust_artifacts") or {}
            if not isinstance(ra, dict):
                print(f"::error::{config_path}: 'rust_artifacts' must be a mapping with optional 'lambdas' and 'binaries' keys")
                sys.exit(1)
            allowed_keys = {"lambdas", "binaries"}
            extra = set(ra.keys()) - allowed_keys
            if extra:
                print(f"::error::{config_path}: 'rust_artifacts' has unknown keys: {sorted(extra)} (allowed: {sorted(allowed_keys)})")
                sys.exit(1)
            lambdas = ra.get("lambdas") or []
            binaries = ra.get("binaries") or []
            if not isinstance(lambdas, list) or not all(isinstance(x, str) for x in lambdas):
                print(f"::error::{config_path}: 'rust_artifacts.lambdas' must be a list of strings (cargo bin names)")
                sys.exit(1)
            for i, b in enumerate(binaries):
                if not (isinstance(b, dict) and isinstance(b.get("bin"), str) and isinstance(b.get("image"), str)):
                    print(f"::error::{config_path}: 'rust_artifacts.binaries[{i}]' must be {{ bin: <name>, image: <dir> }}")
                    sys.exit(1)

        # If the workflow calls the shared reusable workflow, all lint/test
        # steps are guaranteed — skip step-level checks.
        uses_shared = False
        for job_name, job in workflow.get("jobs", {}).items():
            uses = job.get("uses", "")
            if "ahara/.github/workflows/ci.yml" in uses:
                uses_shared = True
                break

        if uses_shared:
            print(f"Governance passed: stack={sorted(stack)}, using shared reusable workflow")
            sys.exit(0)

        # Collect all step names across all jobs
        step_names = []
        for job_name, job in workflow.get("jobs", {}).items():
            for step in job.get("steps", []):
                name = step.get("name", "")
                if name:
                    step_names.append(name)

        # Define required steps per stack component.
        # Each entry is (description, list of prefixes where at least one must match).
        requirements = {
            "rust": [
                ("clippy", ["Lint clippy"]),
                ("format check", ["Lint rustfmt"]),
            ],
            "typescript": [
                ("lint", ["Lint eslint", "Lint frontend"]),
                ("typecheck", ["Lint typecheck"]),
            ],
            "python": [
                ("lint", ["Lint ruff", "Lint backend"]),
            ],
            "dotnet": [
                ("test", ["Test"]),
            ],
            "terraform": [
                ("format check", ["Lint terraform"]),
            ],
        }

        errors = []
        for component in sorted(stack):
            for desc, prefixes in requirements.get(component, []):
                if not any(s.startswith(p) for s in step_names for p in prefixes):
                    errors.append(f"stack '{component}' requires {desc} (step starting with {' or '.join(repr(p) for p in prefixes)})")

        if errors:
            for e in errors:
                print(f"::error::{e}")
            print(f"\nGovernance failed: {len(errors)} missing step(s).")
            print("Add the required steps to .github/workflows/ci.yml or update platform.yml.")
            sys.exit(1)

        print(f"Governance passed: stack={sorted(stack)}, {len(step_names)} steps checked")
        PYEOF
      shell: bash
