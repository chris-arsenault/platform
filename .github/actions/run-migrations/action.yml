name: Run Migrations
description: Upload migration SQL files to S3 and invoke the platform migration Lambda. Requires AWS credentials (OIDC role) to be configured.

inputs:
  project:
    description: Project name (must match migration_projects registration in ahara-infra services layer)
    required: true
  migrations-dir:
    description: Path to the migrations directory relative to the repo root
    required: true
    default: db/migrations

runs:
  using: composite
  steps:
    - run: |
        REGION="us-east-1"
        PROJECT="${{ inputs.project }}"
        MIGRATIONS_DIR="${{ inputs.migrations-dir }}"

        if [ ! -d "${MIGRATIONS_DIR}" ]; then
          echo "No migrations directory at ${MIGRATIONS_DIR}, skipping."
          exit 0
        fi

        BUCKET=$(aws ssm get-parameter --name /ahara/db/migrations-bucket \
          --query Parameter.Value --output text --region "${REGION}")
        FN=$(aws ssm get-parameter --name /ahara/db/migrate-function \
          --query Parameter.Value --output text --region "${REGION}")

        echo "Uploading migrations for ${PROJECT}..."
        aws s3 sync "${MIGRATIONS_DIR}/" "s3://${BUCKET}/migrations/${PROJECT}/" --delete --quiet

        echo "Running migrations..."
        RESULT_FILE=$(mktemp)
        aws lambda invoke \
          --function-name "${FN}" \
          --payload "{\"operation\":\"migrate\",\"project\":\"${PROJECT}\"}" \
          --cli-binary-format raw-in-base64-out \
          --region "${REGION}" \
          "${RESULT_FILE}" > /dev/null

        RESULT=$(cat "${RESULT_FILE}")
        rm "${RESULT_FILE}"

        if echo "${RESULT}" | grep -q '"errorMessage"'; then
          echo "::error::Migration failed for ${PROJECT}"
          echo "${RESULT}" | python3 -m json.tool 2>/dev/null || echo "${RESULT}"
          exit 1
        fi

        echo "${RESULT}" | python3 -m json.tool 2>/dev/null || echo "${RESULT}"
      shell: bash
