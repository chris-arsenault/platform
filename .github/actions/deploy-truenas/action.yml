name: Deploy to TrueNAS
description: Deploy a Docker stack to TrueNAS via the Komodo proxy Lambda. Requires AWS credentials (OIDC role).

inputs:
  stack-name:
    description: Komodo stack name
    required: true
  repo:
    description: GitHub repo in owner/repo format (e.g. chris-arsenault/truenas)
    required: true
  compose-path:
    description: Path to compose file within the repo
    required: true
    default: compose.yaml
  branch:
    description: Git branch to deploy from
    required: false
    default: main
  image-tag:
    description: Container image tag (e.g. github.sha). Set as IMAGE_TAG Komodo variable.
    required: false
    default: ""
  secrets:
    description: |
      Newline-separated KEY=ssm-path pairs. Values are resolved by the Lambda, never exposed to GHA.
      Example:
        DB_PASSWORD=/platform/rds/master-password
        COGNITO_CLIENT_ID=/platform/cognito/client-id
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Ensure TrueNAS database
      run: |
        set -euo pipefail
        REGION="us-east-1"
        DB_FN=$(aws ssm get-parameter --name /platform/truenas-db/function-name \
          --query Parameter.Value --output text --region "${REGION}" 2>/dev/null || echo "")

        if [ -n "${DB_FN}" ]; then
          echo "Ensuring TrueNAS database for ${{ inputs.stack-name }}..."
          RESULT_FILE=$(mktemp)
          aws lambda invoke \
            --function-name "${DB_FN}" \
            --payload "{\"project\":\"${{ inputs.stack-name }}\"}" \
            --cli-binary-format raw-in-base64-out \
            --region "${REGION}" \
            "${RESULT_FILE}" > /dev/null

          RESULT=$(cat "${RESULT_FILE}")
          rm "${RESULT_FILE}"

          if echo "${RESULT}" | grep -q '"errorMessage"'; then
            if echo "${RESULT}" | grep -q 'not registered'; then
              echo "Project not registered for TrueNAS DB, skipping."
            else
              echo "::error::TrueNAS DB manage failed"
              echo "${RESULT}" | python3 -m json.tool 2>/dev/null || echo "${RESULT}"
              exit 1
            fi
          else
            echo "${RESULT}" | python3 -m json.tool 2>/dev/null || true
          fi
        fi
      shell: bash

    - name: Ensure Komodo stack
      run: |
        set -euo pipefail
        REGION="us-east-1"
        FN=$(aws ssm get-parameter --name /platform/komodo/function-name \
          --query Parameter.Value --output text --region "${REGION}")

        invoke_lambda() {
          local payload="$1"
          local result_file
          result_file=$(mktemp)
          aws lambda invoke \
            --function-name "${FN}" \
            --payload "${payload}" \
            --cli-binary-format raw-in-base64-out \
            --region "${REGION}" \
            "${result_file}" > /dev/null
          cat "${result_file}"
          rm "${result_file}"
        }

        # Get the server name from Komodo
        echo "Listing Komodo servers..."
        LIST_RESULT=$(invoke_lambda '{"actions":[{"type":"ListServers"}]}')

        SERVER_NAME=$(echo "${LIST_RESULT}" | python3 -c "
        import sys, json
        data = json.load(sys.stdin)
        results = data.get('results', [])
        if not results or not results[0].get('success'):
            sys.exit(1)
        servers = results[0].get('body', [])
        if not servers:
            sys.exit(1)
        print(servers[0].get('name', ''), end='')
        ")

        if [ -z "${SERVER_NAME}" ]; then
          echo "::error::No Komodo servers found"
          echo "${LIST_RESULT}" | python3 -m json.tool 2>/dev/null || echo "${LIST_RESULT}"
          exit 1
        fi
        echo "Using server: ${SERVER_NAME}"

        # Create the stack with git repo config (tolerate already-exists)
        PAYLOAD=$(python3 -c "
        import json, sys
        print(json.dumps({'actions': [{
            'type': 'CreateStack',
            'name': sys.argv[1],
            'server': sys.argv[2],
            'repo': sys.argv[3],
            'branch': sys.argv[4],
            'file_paths': [sys.argv[5]],
        }]}))
        " "${{ inputs.stack-name }}" "${SERVER_NAME}" "${{ inputs.repo }}" "${{ inputs.branch }}" "${{ inputs.compose-path }}")

        echo "Ensuring stack ${{ inputs.stack-name }} exists..."
        RESULT=$(invoke_lambda "${PAYLOAD}")

        if echo "${RESULT}" | grep -qi 'already exists'; then
          echo "Stack already exists, continuing."
        elif echo "${RESULT}" | python3 -c "
        import sys, json
        data = json.load(sys.stdin)
        results = data.get('results', [])
        failed = [r for r in results if not r.get('success', True)]
        if failed:
            for f in failed:
                err = f.get('error', '')
                if 'already exists' in err.lower():
                    continue
                print(f'FAILED: {f.get(\"action\",\"unknown\")}: {err}')
                sys.exit(1)
        " 2>/dev/null; then
          echo "Stack ensured."
        else
          echo "::error::Stack creation failed"
          echo "${RESULT}" | python3 -m json.tool 2>/dev/null || echo "${RESULT}"
          exit 1
        fi
      shell: bash

    - name: Deploy to Komodo
      run: |
        set -euo pipefail
        REGION="us-east-1"
        FN=$(aws ssm get-parameter --name /platform/komodo/function-name \
          --query Parameter.Value --output text --region "${REGION}")

        invoke_lambda() {
          local payload="$1"
          local result_file
          result_file=$(mktemp)
          aws lambda invoke \
            --function-name "${FN}" \
            --payload "${payload}" \
            --cli-binary-format raw-in-base64-out \
            --region "${REGION}" \
            "${result_file}" > /dev/null
          cat "${result_file}"
          rm "${result_file}"
        }

        # Build secrets JSON from KEY=ssm-path pairs
        SECRETS_JSON="{}"
        if [ -n "${{ inputs.secrets }}" ]; then
          SECRETS_JSON=$(echo '${{ inputs.secrets }}' | python3 -c "
        import sys, json
        d = {}
        for line in sys.stdin:
            line = line.strip()
            if '=' in line:
                k, v = line.split('=', 1)
                d[k] = 'ssm:' + v
        print(json.dumps(d))
        ")
        fi

        # Build the Lambda payload:
        # 1. Resolve SSM secrets and set stack environment (written to .env for compose)
        # 2. Deploy the stack
        PAYLOAD=$(python3 -c "
        import json, sys
        actions = []

        secrets = json.loads(sys.argv[1])
        image_tag = sys.argv[3]

        # Build environment: secrets from SSM + image tag
        env_vars = dict(secrets)
        if image_tag:
            env_vars['IMAGE_TAG'] = image_tag

        if env_vars:
            actions.append({
                'type': 'SetEnvironment',
                'stack': sys.argv[2],
                'variables': env_vars,
            })

        actions.append({
            'type': 'DeployStack',
            'stack': sys.argv[2],
        })

        print(json.dumps({'actions': actions}))
        " "$SECRETS_JSON" "${{ inputs.stack-name }}" "${{ inputs.image-tag }}")

        echo "Deploying ${{ inputs.stack-name }} to TrueNAS..."
        RESULT=$(invoke_lambda "${PAYLOAD}")

        # Check for Lambda-level error
        if echo "${RESULT}" | grep -q '"errorMessage"'; then
          echo "::error::Deploy to TrueNAS failed (Lambda error)"
          echo "${RESULT}" | python3 -m json.tool 2>/dev/null || echo "${RESULT}"
          exit 1
        fi

        # Check for action-level failures in results array
        if echo "${RESULT}" | python3 -c "
        import sys, json
        data = json.load(sys.stdin)
        results = data.get('results', [])
        failed = [r for r in results if not r.get('success', True)]
        if failed:
            for f in failed:
                print(f'FAILED: {f.get(\"action\",\"unknown\")}: {f.get(\"error\",\"no details\")}')
            sys.exit(1)
        " 2>/dev/null; then
          echo "${RESULT}" | python3 -m json.tool 2>/dev/null || echo "${RESULT}"
        else
          echo "::error::Deploy to TrueNAS failed (action error)"
          echo "${RESULT}" | python3 -m json.tool 2>/dev/null || echo "${RESULT}"
          exit 1
        fi
      shell: bash
