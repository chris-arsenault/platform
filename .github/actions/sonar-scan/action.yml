name: SonarQube Scan
description: Run SonarQube analysis and push results. Requires AWS credentials (OIDC role) for SSM token retrieval.

inputs:
  project-key:
    description: SonarQube project key (typically the repo name)
    required: true
  sources:
    description: Comma-separated source directories
    required: false
    default: "."
  exclusions:
    description: Comma-separated glob patterns to exclude
    required: false
    default: ""
  extra-args:
    description: Additional sonar-scanner arguments (e.g. -Dsonar.test.inclusions=...)
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Get SonarQube token from SSM
      id: token
      run: |
        set -euo pipefail
        REGION="us-east-1"

        echo "Reading CI token from SSM..."
        TOKEN=$(aws ssm get-parameter --name /platform/sonarqube/ci-token \
          --with-decryption --query Parameter.Value --output text --region "${REGION}")
        echo "Token length: ${#TOKEN}, prefix: ${TOKEN:0:5}..."
        echo "::add-mask::${TOKEN}"
        echo "token=${TOKEN}" >> "$GITHUB_OUTPUT"

        echo "Reading SonarQube URL from SSM..."
        URL=$(aws ssm get-parameter --name /platform/sonarqube/url \
          --query Parameter.Value --output text --region "${REGION}")
        echo "URL: ${URL}"
        echo "url=${URL}" >> "$GITHUB_OUTPUT"

        echo "Project: ${{ inputs.project-key }}"

        echo "Validating token..."
        curl -sf -u "${TOKEN}:" "${URL}/api/authentication/validate"
        echo ""
        echo "Token user:"
        curl -sf -u "${TOKEN}:" "${URL}/api/users/current"
        echo ""
      shell: bash

    - name: SonarQube Scan
      uses: SonarSource/sonarqube-scan-action@v6
      with:
        args: >
          -Dsonar.projectKey=${{ inputs.project-key }}
          -Dsonar.sources=${{ inputs.sources }}
          -Dsonar.exclusions=${{ inputs.exclusions }}
          -Dsonar.token=${{ steps.token.outputs.token }}
          -Dsonar.verbose=true
          ${{ inputs.extra-args }}
      env:
        SONAR_TOKEN: ${{ steps.token.outputs.token }}
        SONAR_HOST_URL: ${{ steps.token.outputs.url }}
